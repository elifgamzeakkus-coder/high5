<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High5 — Kişisel Danışman</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f1;--white:#fff;--border:#e2e0da;--text:#1c1b19;--sub:#7a7870;--muted:#b0ada6;--green:#2a6b38;--green-bg:#eef6f0;--tag:#eeede9}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{background:var(--white);border-bottom:1px solid var(--border);height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-logo{display:flex;align-items:center;gap:10px}
.logo-box{width:32px;height:32px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.logo-name{font-size:1.1rem;font-weight:700;letter-spacing:-.5px}
.hdr-brands{display:flex;gap:4px;flex-wrap:wrap}
.bp{background:var(--tag);border-radius:4px;padding:2px 7px;font-size:.6rem;font-weight:700;color:var(--sub);letter-spacing:.8px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:10px}
.dot-online{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--green);font-weight:500}
.dot-online::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-new{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:500;color:var(--sub);cursor:pointer;transition:all .15s;display:none}
.btn-new:hover{background:var(--tag);color:var(--text)}
.chat{flex:1;overflow-y:auto;padding:28px 0 12px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msgs{max-width:720px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:20px}
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:24px 0 8px;animation:up .4s ease both}
.ai-face{width:52px;height:52px;background:var(--text);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.welcome h2{font-size:1.2rem;font-weight:600;letter-spacing:-.3px}
.welcome p{font-size:.86rem;color:var(--sub);max-width:400px;line-height:1.65;font-weight:300}
.brand-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.brand-pill{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:.65rem;font-weight:700;color:var(--sub);letter-spacing:1px;text-transform:uppercase}
.sug-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.sug{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-family:'Outfit',sans-serif;font-size:.79rem;color:var(--text);cursor:pointer;transition:all .15s}
.sug:hover{background:var(--text);color:#fff;border-color:var(--text)}
.row{display:flex;gap:10px;align-items:flex-start;animation:up .3s ease both}
.row.user{flex-direction:row-reverse}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-top:2px}
.av.ai{background:var(--text);color:#fff}
.av.user{background:var(--tag)}
.msg-body{display:flex;flex-direction:column;gap:5px;max-width:82%}
.row.user .msg-body{align-items:flex-end}
.row.cards-row .msg-body{max-width:100%}
.bubble{padding:11px 15px;border-radius:14px;font-size:.87rem;line-height:1.65}
.bubble.ai{background:var(--white);border:1px solid var(--border);border-top-left-radius:4px}
.bubble.user{background:var(--text);color:#fff;border-top-right-radius:4px}
.ts{font-size:.63rem;color:var(--muted);font-family:monospace;padding:0 3px}
.cards-wrap{display:flex;flex-direction:column;gap:9px;width:100%;max-width:520px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:box-shadow .2s}
.sc:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.sc:nth-child(1){animation:up .35s ease .0s both}
.sc:nth-child(2){animation:up .35s ease .07s both}
.sc:nth-child(3){animation:up .35s ease .14s both}
.sc:nth-child(4){animation:up .35s ease .21s both}
.sc-head{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
/* Product image */
.sc-img-wrap{width:72px;height:72px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--tag);display:flex;align-items:center;justify-content:center;position:relative}
.sc-img-wrap img{width:100%;height:100%;object-fit:contain;transition:opacity .3s}
.sc-img-wrap .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.sc-info{flex:1;min-width:0}
.sc-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.sc-brand-tag{font-size:.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;padding:2px 6px;border-radius:4px}
.sc-rank{font-size:.58rem;font-weight:600;font-family:monospace;color:var(--muted)}
.sc-match{background:var(--green-bg);color:var(--green);font-size:.61rem;font-weight:600;padding:2px 6px;border-radius:20px}
.sc-name{font-size:.92rem;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-sub{font-size:.7rem;color:var(--sub);font-weight:300;margin-top:1px}
.sc-price{font-size:.88rem;font-weight:700;white-space:nowrap;text-align:right}
.sc-price small{display:block;font-size:.62rem;color:var(--muted);font-weight:400}
.sc-body{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.sc-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{background:var(--tag);color:var(--sub);font-size:.63rem;font-weight:500;padding:2px 7px;border-radius:4px}
.tag.hi{background:var(--green-bg);color:var(--green)}
.sc-feats{display:flex;flex-direction:column;gap:3px}
.feat{display:flex;align-items:flex-start;gap:7px;font-size:.74rem;color:#555;line-height:1.45}
.feat::before{content:'—';color:var(--muted);font-size:.67rem;margin-top:1px;flex-shrink:0}
.expert{background:var(--tag);border-radius:9px;padding:10px 13px;font-size:.79rem;color:var(--sub);line-height:1.6;font-weight:300;border-left:3px solid var(--border);margin-top:3px;max-width:520px}
.expert strong{font-weight:600;color:var(--text);display:block;margin-bottom:3px;font-size:.66rem;letter-spacing:1px;text-transform:uppercase}
.typing-row{display:flex;gap:10px;align-items:flex-start}
.typing-bub{background:var(--white);border:1px solid var(--border);border-radius:14px;border-top-left-radius:4px;padding:13px 16px;display:flex;gap:4px;align-items:center}
.td{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.15s}
.td:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.inp-area{background:var(--white);border-top:1px solid var(--border);padding:13px 20px 17px;flex-shrink:0}
.inp-wrap{max-width:720px;margin:0 auto}
.inp-box{display:flex;gap:8px;align-items:flex-end;background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:9px 9px 9px 15px;transition:border-color .2s}
.inp-box:focus-within{border-color:var(--text);background:var(--white)}
textarea{flex:1;background:none;border:none;outline:none;font-family:'Outfit',sans-serif;font-size:.89rem;color:var(--text);resize:none;max-height:110px;min-height:22px;line-height:1.55;padding:0}
textarea::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;background:var(--text);border:none;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;color:#fff}
.send-btn:hover{background:#333;transform:scale(1.04)}
.send-btn:active{transform:scale(.97)}
.send-btn:disabled{background:var(--muted);cursor:not-allowed;transform:none}
.send-btn svg{width:15px;height:15px}
.hint{margin-top:7px;font-size:.65rem;color:var(--muted);text-align:center;font-family:monospace}
@media(max-width:600px){.hdr-brands{display:none}.msgs{padding:0 14px}.inp-area{padding:10px 14px 14px}.msg-body{max-width:92%}.cards-wrap{max-width:100%}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <div class="logo-box">👟</div>
    <span class="logo-name">high5</span>
  </div>
  <div class="hdr-brands">
    <span class="bp">ASICS</span><span class="bp">HOKA</span><span class="bp">On</span>
    <span class="bp">Salomon</span><span class="bp">Brooks</span><span class="bp">Saucony</span><span class="bp">Skechers</span>
  </div>
  <div class="hdr-right">
    <div class="dot-online">Aktif</div>
    <button class="btn-new" id="btnNew" onclick="resetChat()">↺ Yeni</button>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="ai-face">👟</div>
      <h2>Merhaba! Ben kişisel danışmanınım.</h2>
      <p>Hangi markadan olursa olsun, ihtiyacına en uygun ayakkabıyı birlikte bulalım.</p>
      <div class="brand-row">
        <span class="brand-pill">ASICS</span><span class="brand-pill">HOKA</span>
        <span class="brand-pill">On Running</span><span class="brand-pill">Salomon</span>
        <span class="brand-pill">Brooks</span><span class="brand-pill">Saucony</span><span class="brand-pill">Skechers</span>
      </div>
      <div class="sug-row">
        <button class="sug" onclick="go('Haftada 4 gün 10km koşuyorum, pronasyon var')">🏃 Haftada 4 gün koşu</button>
        <button class="sug" onclick="go('Maraton için en iyi yarış ayakkabısı hangisi?')">⚡ Maraton</button>
        <button class="sug" onclick="go('Patika ve dağ koşusu için trail ayakkabı istiyorum')">🏔️ Trail</button>
        <button class="sug" onclick="go('Diz ağrım var, uzun koşularda destek lazım')">🦵 Diz desteği</button>
        <button class="sug" onclick="go('Hem koşu hem günlük için rahat bir ayakkabı')">✨ Günlük & Koşu</button>
        <button class="sug" onclick="go('Maksimum tampon isteyen için en iyi seçenek?')">☁️ Max tampon</button>
      </div>
    </div>
  </div>
</div>

<div class="inp-area">
  <div class="inp-wrap">
    <div class="inp-box">
      <textarea id="inp" placeholder="İhtiyacını yaz, tüm markalardan karşılaştırmalı öneri alayım…" rows="1"
        onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="hint">Enter → gönder · Shift+Enter → yeni satır</div>
  </div>
</div>

<script>
// ── CDN base
const CDN = 'https://f-hfv-l.sm.mncdn.com/mnresize/400/400/livephotos/8/';

// ── Gerçek SKU haritası (high5.com.tr'den alındı)
const IMG_MAP = {
  // ASICS
  'GEL-Nimbus 28':      '1011c127-400/1011c127-400-01_1.jpg',
  'GEL-Nimbus 26':      '1011b547-960/1011b547-960-01.jpg',
  'GEL-Kayano 31':      '1011b867-001/1011b867-001-01_1.jpg',
  'GEL-Cumulus 26':     '1011b792-020/1011b792-020-01_1.jpg',
  'GT-2000 13':         '1011c127-400/1011c127-400-01_1.jpg',
  'Novablast 4':        '1011b681-001/1011b681-001-01_1.jpg',
  'GEL-Trabuco 12':     '1011b681-001/1011b681-001-01_1.jpg',
  'Superblast 3':       '1013a177-400/1013a177-400-01.jpg',
  'Metaspeed Sky+':     '1013a017-400/1013a017-400-01.jpg',
  // HOKA
  'Bondi 9':            '1162012-lrmt/1162012-lrmt_1.jpg',
  'Bondi 8':            '1123202-ibb/1123202-ibb_1.jpg',
  'Clifton 9':          '1127895-wgln/1127895-wgln_1.jpg',
  'Mach 7':             '1171904-fyz/1171904-fyz_1.jpg',
  'Mach 6':             '1147790-fyz/1147790-fyz_1.jpg',
  'Speedgoat 6':        '1147793-sos/1147793-sos_1.jpg',
  'Arahi 7':            '1147850-vin/1147850-vin_1.jpg',
  // On Running
  'Cloudmonster 3':     '3mg10054859/3mg10054859-1.jpg',
  'Cloudrunner 3':      '3mg10071536/3mg10071536-1.jpg',
  'Cloudultra 3':       '3wf30114105/3wf30114105_01.jpg',
  'Cloud 5':            '3md30020553/3md30020553-1.jpg',
  'Cloudboom Strike':   '3md10047553/3md10047553-1.jpg',
  // Brooks
  'Ghost 16':           '1104182d046/1104182d046-01_1.jpg',
  'Glycerin 21':        '1104071d025/1104071d025-01_1.jpg',
  'Glycerin Flex':      '1104781d114/1104781d114-01_1.jpg',
  'Glycerin Max 2':     '1204681b048/1204681b048-01.jpg',
  'Adrenaline GTS 24':  '1104473d432/1104473d432-01_1.jpg',
  'Cascadia 17':        '1103931d432/1103931d432-01_1.jpg',
  // Salomon
  'Speedcross 6':       'l41110000/l41110000-01.jpg',
  'Sense Ride 5':       'l47115100/l47115100-01.jpg',
  'XA Pro 3D V9':       'l47270700/l47270700-01.jpg',
  // Saucony
  'Kinvara 14':         's20823-16/s20823-16_1.jpg',
  'Ride 17':            's20924-25/s20924-25_1.jpg',
  'Guide 17':           's20936-45/s20936-45_1.jpg',
  'Peregrine 14':       's20838-35/s20838-35_1.jpg',
  'Triumph 22':         's10936-25/s10936-25_1.jpg',
  // Skechers
  'GOrun Max Cushioning Elite': '246085-bkgy/246085-bkgy_1.jpg',
  'GO Walk Max':        '216136-bbk/216136-bbk_1.jpg',
};

const BRAND_COLORS = {
  'ASICS':'#003DA5','HOKA':'#E0821D','On Running':'#1c1b19',
  'Salomon':'#C41230','Brooks':'#0066CC','Saucony':'#0047AB','Skechers':'#1E5EA8'
};
const EMOJIS = {running:'👟',trail:'🥾',tennis:'🎾',gym:'💪',walking:'🚶',racing:'⚡',stability:'🦺',casual:'✨'};

const SYSTEM = `Sen high5.com.tr mağazasının kişisel AI ayakkabı danışmanısın.
high5.com.tr'de şu markalar var: ASICS, HOKA, On Running, Salomon, Brooks, Saucony, Skechers.
Müşterinin ihtiyacına göre bu markalardan en uygun 3-4 farklı model öner. Karşılaştırmalı öneri yap.

SADECE şu formatta yanıt ver — başka hiçbir şey yazma:

INTRO: <1-2 cümle samimi Türkçe giriş>
JSON:
{
  "shoes": [
    {
      "brand": "HOKA",
      "name": "Bondi 9",
      "subtitle": "Maksimum Tampon · Nötr",
      "matchPercent": 95,
      "rank": 1,
      "type": "running",
      "price": "10.999",
      "tags": ["Maksimum Tampon", "Uzun Mesafe"],
      "features": ["Meta-Rocker taban ile yumuşak geçiş","Genişletilmiş EVA köpük","Nefes alan örgü üst yapı"]
    }
  ],
  "expertNote": "Kısa karşılaştırmalı uzman notu"
}

type: running, trail, tennis, gym, walking, racing, stability, casual
matchPercent: 75-98

Güncel modeller (bunları kullan):
ASICS: GEL-Nimbus 28, GEL-Kayano 31, GEL-Cumulus 26, GT-2000 13, Novablast 4, Superblast 3, GEL-Trabuco 12, Metaspeed Sky+
HOKA: Bondi 9, Clifton 9, Mach 7, Speedgoat 6, Arahi 7
On Running: Cloudmonster 3, Cloudrunner 3, Cloud 5, Cloudultra 3, Cloudboom Strike
Salomon: Speedcross 6, Sense Ride 5, XA Pro 3D V9
Brooks: Ghost 16, Glycerin 21, Glycerin Max 2, Adrenaline GTS 24, Cascadia 17
Saucony: Kinvara 14, Ride 17, Guide 17, Peregrine 14, Triumph 22
Skechers: GOrun Max Cushioning Elite, GO Walk Max
Tüm özellikler Türkçe olsun.`;

let busy = false;
function now(){ return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}); }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function scrollBot(){ const c=document.getElementById('chat'); setTimeout(()=>c.scrollTo({top:c.scrollHeight,behavior:'smooth'}),50); }
function addMsg(html){ document.getElementById('msgs').insertAdjacentHTML('beforeend',html); scrollBot(); }

function getImgHtml(name, brand, type) {
  const sku = IMG_MAP[name];
  const col = BRAND_COLORS[brand] || '#888';
  const em = EMOJIS[type] || '👟';
  if (sku) {
    const url = CDN + sku;
    return `<div class="sc-img-wrap" style="background:${col}0d">
      <img src="${url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="fallback" style="display:none">${em}</div>
    </div>`;
  }
  return `<div class="sc-img-wrap" style="background:${col}0d"><div class="fallback">${em}</div></div>`;
}

function userBubble(text){
  document.getElementById('welcome')?.remove();
  document.getElementById('btnNew').style.display='block';
  addMsg(`<div class="row user">
    <div class="av user">🙂</div>
    <div class="msg-body">
      <div class="bubble user">${text.replace(/\n/g,'<br>')}</div>
      <div class="ts">${now()}</div>
    </div>
  </div>`);
}

function showTyping(){
  addMsg(`<div class="typing-row" id="typing">
    <div class="av ai">👟</div>
    <div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div>
  </div>`);
}
function removeTyping(){ document.getElementById('typing')?.remove(); }

function renderResponse(raw){
  const im = raw.match(/INTRO:\s*([\s\S]+?)(?=JSON:|$)/);
  const jm = raw.match(/JSON:\s*(\{[\s\S]+\})/);
  if(im) addMsg(`<div class="row">
    <div class="av ai">👟</div>
    <div class="msg-body">
      <div class="bubble ai">${im[1].trim()}</div>
      <div class="ts">${now()}</div>
    </div>
  </div>`);

  if(jm){
    try{
      const p = JSON.parse(jm[1].trim());
      const cardsHtml = p.shoes.map(s=>{
        const col = BRAND_COLORS[s.brand]||'#555';
        const tags = (s.tags||[]).map((t,i)=>`<span class="tag${i===0?' hi':''}">${t}</span>`).join('');
        const feats = (s.features||[]).map(f=>`<div class="feat">${f}</div>`).join('');
        const imgHtml = getImgHtml(s.name, s.brand, s.type);
        return `<div class="sc">
          <div class="sc-head">
            ${imgHtml}
            <div class="sc-info">
              <div class="sc-top">
                <span class="sc-brand-tag" style="background:${col}">${s.brand}</span>
                <span class="sc-rank">#${s.rank}</span>
                <span class="sc-match">%${s.matchPercent}</span>
              </div>
              <div class="sc-name">${s.name}</div>
              <div class="sc-sub">${s.subtitle}</div>
            </div>
            <div class="sc-price">${s.price} TL<small>tahmini</small></div>
          </div>
          <div class="sc-body">
            <div class="sc-tags">${tags}</div>
            <div class="sc-feats">${feats}</div>
          </div>
        </div>`;
      }).join('');
      addMsg(`<div class="row cards-row">
        <div class="av ai">👟</div>
        <div class="msg-body">
          <div class="cards-wrap">${cardsHtml}</div>
          <div class="expert"><strong>Uzman notu</strong>${p.expertNote}</div>
          <div class="ts">${now()}</div>
        </div>
      </div>`);
    }catch(e){
      if(!im) addMsg(`<div class="row"><div class="av ai">👟</div><div class="msg-body"><div class="bubble ai">${raw}</div><div class="ts">${now()}</div></div></div>`);
    }
  } else if(!im){
    addMsg(`<div class="row"><div class="av ai">👟</div><div class="msg-body"><div class="bubble ai">${raw}</div><div class="ts">${now()}</div></div></div>`);
  }
}

async function send(){
  if(busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  busy=true; document.getElementById('sendBtn').disabled=true;
  userBubble(text);
  showTyping();
  try{
    const res = await fetch("/api/chat",{
      method:"POST",
